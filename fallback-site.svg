<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 900" width="860" height="900">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="0.5" stop-color="#181818"/>
      <stop offset="0.82" stop-color="#5a5f63"/>
      <stop offset="1" stop-color="#d7dade" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wireTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242424"/><stop offset="1" stop-color="#8a8f93"/>
    </linearGradient>
    <linearGradient id="wireLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b7075"/><stop offset="1" stop-color="#dfe1e3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- overhead wires fanning from the top hub (~575,105) -->
  <g stroke="url(#wireTop)" stroke-width="1.6" fill="none">
    <path d="M575 92 L860 40"/><path d="M575 96 L860 120"/><path d="M575 100 L860 205"/>
    <path d="M575 104 L860 300"/><path d="M578 118 L860 415"/><path d="M700 64 L860 8"/>
    <path d="M560 92 L250 250"/><path d="M545 100 L0 300"/><path d="M545 130 L0 405"/>
    <path d="M600 70 L470 0"/><path d="M560 78 L250 0"/><path d="M575 92 L720 0"/>
    <path d="M545 150 L0 470"/>
  </g>
  <!-- lower wires + guy lines, fading toward the bottom -->
  <g stroke="url(#wireLow)" stroke-width="1.7" fill="none">
    <path d="M575 300 L860 520"/><path d="M575 320 L860 660"/><path d="M560 300 L0 560"/>
    <path d="M560 330 L0 690"/><path d="M575 305 L330 760"/><path d="M575 315 L800 800"/>
    <path d="M568 470 L420 820"/><path d="M572 470 L720 850"/>
  </g>
  <g stroke="#2b2f33" stroke-width="3" fill="none" opacity="0.9">
    <path d="M566 300 L360 640"/><path d="M584 300 L640 560"/>
  </g>

  <!-- crossarms -->
  <g fill="#161616">
    <rect x="470" y="120" width="220" height="13" rx="2"/>
    <rect x="485" y="196" width="190" height="12" rx="2"/>
    <rect x="505" y="286" width="150" height="11" rx="2"/>
  </g>

  <!-- drooping insulators / hardware clustered at the top -->
  <g fill="#161616">
    <path d="M492 120 q-8 26 -2 40 q10 6 14 -6 q4 -20 -12 -34z"/>
    <path d="M523 118 q-7 30 0 44 q11 5 14 -8 q3 -22 -14 -36z"/>
    <path d="M556 112 q-6 34 2 50 q12 5 14 -9 q1 -26 -16 -41z"/>
    <path d="M592 112 q6 34 -2 50 q-12 5 -14 -9 q-1 -26 16 -41z"/>
    <path d="M628 118 q7 30 0 44 q-11 5 -14 -8 q-3 -22 14 -36z"/>
    <path d="M662 120 q8 26 2 40 q-10 6 -14 -6 q-4 -20 12 -34z"/>
    <ellipse cx="505" cy="196" rx="9" ry="14"/><ellipse cx="545" cy="196" rx="9" ry="14"/>
    <ellipse cx="615" cy="196" rx="9" ry="14"/><ellipse cx="655" cy="196" rx="9" ry="14"/>
    <ellipse cx="520" cy="288" rx="8" ry="12"/><ellipse cx="640" cy="288" rx="8" ry="12"/>
    <circle cx="575" cy="150" r="16"/>
  </g>

  <!-- the pole, fading out at the bottom -->
  <polygon fill="url(#fade)" points="566,96 590,96 612,900 548,900"/>
  <!-- a couple of dark bands / hardware on the pole -->
  <g fill="#111"><rect x="560" y="470" width="40" height="10"/><rect x="556" y="300" width="48" height="9"/></g>
</svg>
